<!DOCTYPE html>
<html>
<head>

    <title>Admin Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;

            background:#f5f5f5;

            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:400px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:12px;

            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h2{
            margin-bottom:15px;

            text-align:center;
        }

        a{
            display:inline-block;

            margin-bottom:20px;

            text-decoration:none;

            color:blue;

            font-weight:bold;
        }

        input,
        textarea{
            width:100%;

            padding:12px;

            margin-top:10px;

            border:1px solid #ddd;
            border-radius:8px;

            font-size:15px;
        }

        textarea{
            resize:none;
            height:150px;
        }

        button{
            width:100%;

            margin-top:15px;

            padding:12px;

            border:none;
            border-radius:8px;

            background:blue;
            color:white;

            font-size:15px;
            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            opacity:0.9;
        }

        /* MOBILE */

        @media(max-width:768px){

            body{
                padding:20px 15px;
            }

            .container{
                padding:20px;
            }

            h2{
                font-size:26px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Admin Panel</h2>

        
<a href="/">⬅ Back to Home</a>

<br>

<a href="/logout">🚪 Logout</a>

        <form method="POST">

            <input
                type="text"
                name="question"
                placeholder="Enter Question"
                required
            >

            <textarea
                name="answer"
                placeholder="Enter Answer"
                required
            ></textarea>

            <button type="submit">
                Add FAQ
            </button>

        </form>
<hr style="margin:20px 0;">

<h3>FAQ List</h3>

{% for faq in faqs %}

<div style="
margin-top:10px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;">

<b>{{ faq.question }}</b>

<br><br>

{{ faq.answer }}
<br><br>

<a href="/edit-faq/{{ faq.id }}"
style="
background:green;
color:white;
padding:8px 12px;
border-radius:5px;
text-decoration:none;
margin-right:10px;">
Edit
</a>

<a href="/delete-faq/{{ faq.id }}"
style="
background:red;
color:white;
padding:8px 12px;
border-radius:5px;
text-decoration:none;">
Delete
</a>
</div>

{% endfor %}
    </div>

</body>
</html>
