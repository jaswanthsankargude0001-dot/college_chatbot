<!DOCTYPE html>
<html>
<head>

    <title>Admin Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;

            background:#f5f5f5;

            min-height:100vh;

            padding:40px 20px;
        }

        .login-box{
            width:auto;
            max-width:350px;

            background:white;

            padding:30px;

            border-radius:12px;

            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h2{
            margin-bottom:20px;

            text-align:center;
        }

        input{
            width:100%;

            padding:12px;

            margin-top:12px;

            border:1px solid #ddd;
            border-radius:8px;

            font-size:15px;
        }

        input:focus{
            outline:none;

            border-color:blue;
        }

        button{
            width:100%;

            margin-top:18px;

            padding:12px;

            border:none;
            border-radius:8px;

            background:blue;
            color:white;

            font-size:15px;
            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            opacity:0.9;
        }

        /* MOBILE */

        @media(max-width:768px){

            .login-box{
                padding:25px 20px;
            }

            h2{
                font-size:28px;
            }

        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Admin Login</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
